<!DOCTYPE html>
<html>
<head>
  <title>Employee Resume Upload</title>
  <meta charset="UTF-8">

  <style>
    body {
      background: linear-gradient(135deg, #12239E 0%, #0070AD 100%);
      font-family: 'Segoe UI';
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      margin-bottom: 20px;
    }

    h2 {
      color: #12239E;
      text-align: center;
      margin-bottom: 20px;
      margin-top: 0;
    }

    h3 {
      color: #0070AD;
      font-size: 16px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    label {
      font-weight: 600;
      margin-top: 10px;
      display: block;
      color: #333;
    }

    input[type="file"] {
      margin-top: 10px;
      padding: 8px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      background: #fafafa;
    }

    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, #6bcf7f 0%, #27d383 100%);
      font-size: 16px;
      transition: opacity 0.3s;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn.secondary {
      background: linear-gradient(135deg, #0070AD 0%, #005a8f 100%);
      margin-top: 10px;
      width: auto;
      padding: 10px 20px;
    }

    #logoutBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      z-index: 999;
    }
    #logoutBtn:hover { background: #c82333; }
    #jduploadbtn {
      position: fixed;
      top: 20px;
      right: 100px;
      padding: 8px 16px;
      background: #0070AD;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      z-index: 999;
    }
    #jduploadbtn:hover { background: #005a8f; }

    .resume-info {
      background: #f0f4f8;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      border-left: 4px solid #6bcf7f;
    }

    .resume-info-item {
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .resume-info-label {
      font-weight: 600;
      color: #12239E;
      min-width: 150px;
    }

    .resume-info-value {
      color: #333;
      word-break: break-all;
    }

    .no-resume {
      color: #dc3545;
      font-style: italic;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

  </style>

</head>

<body>
  <div class="container">
    <button id="logoutBtn">Logout</button>
    <button id="jduploadbtn" style="display:none;">JD Upload</button>

    <!-- Current Resume Status Card -->
    <div class="card">
      <h2>📄 Your Resume</h2>
      <div id="resumeStatus">
        <p style="text-align: center; color: #999;">Loading resume information...</p>
      </div>
    </div>

    <!-- Upload/Update Resume Card -->
    <div class="card">
      <h2>Upload / Update Your Resume</h2>
      
      <div id="uploadMessage" class="message"></div>

      <label>Select Resume File</label>
      <input type="file" id="resumeFile" accept=".pdf,.docx,.doc,.pptx">
      <small style="color: #666; display: block; margin-top: 5px;">Supported formats: PDF, DOCX, DOC, PPTX</small>

      <button class="btn" id="submitBtn">Upload Resume</button>
    </div>
  </div>

  <script>
    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const response = await fetch('/api/logout', { method: 'POST' });
      const result = await response.json();
      if (result.redirect) {
        window.location.href = result.redirect;
      }
    });

    //jdupload button
    document.getElementById('jduploadbtn').addEventListener('click', async () => {
        window.location.href = '/jd_matching';
    });


    // Load resume information
    async function loadResumeInfo() {
      try {
        const response = await fetch('/api/resume-info');
        const data = await response.json();

        const resumeStatus = document.getElementById('resumeStatus');

        if (data.status === 'no_resume') {
          resumeStatus.innerHTML = `
            <div class="resume-info">
              <div class="resume-info-item">
                <span class="resume-info-label">Current Resume:</span>
                <span class="resume-info-value no-resume">No resume uploaded yet</span>
              </div>
            </div>
            <p style="color: #666; text-align: center;">Upload your first resume to get started!</p>
          `;
        } else {
          resumeStatus.innerHTML = `
            <div class="resume-info">
              <div class="resume-info-item">
                <span class="resume-info-label">Filename:</span>
                <span class="resume-info-value">${escapeHtml(data.filename)}</span>
              </div>
              <div class="resume-info-item">
                <span class="resume-info-label">Current Version:</span>
                <span class="resume-info-value"><strong>v${data.version}</strong></span>
              </div>
              <div class="resume-info-item">
                <span class="resume-info-label">Total Versions:</span>
                <span class="resume-info-value"><strong>${data.total_versions}</strong></span>
              </div>
              <div class="resume-info-item" style="margin-top: 15px;">
                <button class="btn secondary" id="downloadBtn">⬇️ Download Current Version</button>
              </div>
            </div>
          `;
          
          document.getElementById('downloadBtn').addEventListener('click', downloadResume);
        }
      } catch (error) {
        console.error('Error loading resume info:', error);
        document.getElementById('resumeStatus').innerHTML = `
          <div class="message error" style="display: block;">
            Failed to load resume information. Please refresh the page.
          </div>
        `;
      }
    }

    // Download resume
    async function downloadResume() {
      try {
        const response = await fetch('/api/download-resume');
        if (!response.ok) {
          const error = await response.json();
          showMessage('error', error.error || 'Download failed');
          return;
        }

        const blob = await response.blob();
        const filename = response.headers.get('content-disposition')?.split('filename=')[1]?.replace(/"/g, '') || 'resume.pdf';
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = decodeURIComponent(filename);
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
      } catch (error) {
        console.error('Download error:', error);
        showMessage('error', 'Failed to download resume');
      }
    }

    // Upload resume
    document.getElementById('submitBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('resumeFile');
      const file = fileInput.files[0];

      if (!file) {
        showMessage('error', 'Please select a file');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = 'Uploading...';

      try {
        const formData = new FormData();
        formData.append('file', file);

        const response = await fetch('/api/upload-resume', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          showMessage('success', result.message);
          fileInput.value = '';
          // Reload resume info
          setTimeout(() => {
            loadResumeInfo();
          }, 500);
        } else {
          showMessage('error', result.error || 'Upload failed');
        }
      } catch (error) {
        console.error('Upload error:', error);
        showMessage('error', 'An error occurred during upload');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Upload Resume';
      }
    });

    // Show message
    function showMessage(type, message) {
      const messageDiv = document.getElementById('uploadMessage');
      messageDiv.className = `message ${type}`;
      messageDiv.innerText = message;
      messageDiv.style.display = 'block';

      if (type === 'success') {
        setTimeout(() => {
          messageDiv.style.display = 'none';
        }, 5000);
      }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Grade visibility for JD Upload button
    const GRADE_ORDER = ['A1','A2','A3','A4','A5','B1','B2','C1','C2','D1','D2','E1','E2'];

    async function applyGradeVisibility() {
      try {
        const res = await fetch('/api/user');
        const user = await res.json();
        const grade = (user.grade || '').toUpperCase().trim();
        const idx = GRADE_ORDER.indexOf(grade);
        const threshold = GRADE_ORDER.indexOf('C2');
        document.getElementById('jduploadbtn').style.display = (idx >= threshold) ? 'block' : 'none';
      } catch (e) {
        document.getElementById('jduploadbtn').style.display = 'none';
      }
    }

    // Load resume info on page load
    loadResumeInfo();
    applyGradeVisibility();
  </script>
</body>
</html>
