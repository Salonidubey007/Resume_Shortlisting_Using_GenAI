<!DOCTYPE html>
<html>
<head>
  <title>Change Password</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #12239E 0%, #0070AD 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 50px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .lock-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #12239E 0%, #0070AD 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }

    .card-header h2 {
      color: #12239E;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-header p {
      color: #7f8c8d;
      font-size: 13px;
    }

    .divider {
      border: none;
      border-top: 2px solid #f0f0f0;
      margin: 24px 0;
    }

    .field-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 12px;
      color: #34495e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle input {
      width: 100%;
      padding: 11px 44px 11px 14px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      background: #fafafa;
      font-family: inherit;
      transition: all 0.2s ease;
      color: #2c3e50;
      box-sizing: border-box;
    }

    .password-toggle input:focus {
      outline: none;
      border-color: #6bcf7f;
      background: white;
      box-shadow: 0 0 0 4px rgba(107,207,127,0.1);
    }

    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      user-select: none;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6bcf7f 0%, #27d383 100%);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 16px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .back-btn {
      background: none;
      border: none;
      color: #0070AD;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0 0 20px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover { text-decoration: underline; }

    .strength-bar {
      height: 4px;
      border-radius: 4px;
      margin-top: 6px;
      background: #e8e8e8;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .strength-label {
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
      color: #7f8c8d;
    }
  </style>
</head>

<body>
  <div class="card">

    <button class="back-btn" onclick="window.location.href='/profile-update'">&#8592; Back to Profile</button>

    <div class="card-header">
      <div class="lock-icon">🔒</div>
      <h2>Change Password</h2>
      <p>Enter your current password and choose a new one</p>
    </div>

    <hr class="divider">

    <div class="field-group">
      <label>Current Password</label>
      <div class="password-toggle">
        <input type="password" id="currentPassword" placeholder="Enter current password">
        <span class="toggle-eye" onclick="togglePwd('currentPassword')">👁</span>
      </div>
    </div>

    <div class="field-group">
      <label>New Password</label>
      <div class="password-toggle">
        <input type="password" id="newPassword" placeholder="Min. 6 characters" oninput="checkStrength(this.value)">
        <span class="toggle-eye" onclick="togglePwd('newPassword')">👁</span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="field-group">
      <label>Confirm New Password</label>
      <div class="password-toggle">
        <input type="password" id="confirmPassword" placeholder="Re-enter new password">
        <span class="toggle-eye" onclick="togglePwd('confirmPassword')">👁</span>
      </div>
    </div>

    <button class="btn btn-primary" id="btnChangePassword">Change Password</button>

    <div class="message" id="pwdMessage"></div>

  </div>

  <script>
    document.getElementById('btnChangePassword').addEventListener('click', async () => {
      const current = document.getElementById('currentPassword').value;
      const newPwd = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (!current || !newPwd || !confirm) {
        showMessage('error', 'All fields are required.');
        return;
      }
      if (newPwd.length < 6) {
        showMessage('error', 'New password must be at least 6 characters.');
        return;
      }
      if (newPwd !== confirm) {
        showMessage('error', 'New passwords do not match.');
        return;
      }

      const btn = document.getElementById('btnChangePassword');
      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const res = await fetch('/api/profile/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: current, new_password: newPwd })
        });
        const data = await res.json();
        if (!res.ok) {
          showMessage('error', data.error || 'Failed to change password.');
        } else {
          showMessage('success', '✅ Password changed successfully! Redirecting...');
          setTimeout(() => window.location.href = '/profile-update', 2000);
        }
      } catch (e) {
        showMessage('error', 'Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Change Password';
      }
    });

    function togglePwd(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = [
        { pct: '0%',   color: '#e8e8e8', text: '' },
        { pct: '25%',  color: '#ff6b6b', text: 'Weak' },
        { pct: '50%',  color: '#ffd93d', text: 'Fair' },
        { pct: '75%',  color: '#6bcf7f', text: 'Good' },
        { pct: '100%', color: '#27d383', text: 'Strong' },
      ];
      const l = levels[strength];
      fill.style.width = l.pct;
      fill.style.background = l.color;
      label.textContent = l.text;
      label.style.color = l.color;
    }

    function showMessage(type, text) {
      const el = document.getElementById('pwdMessage');
      el.className = `message ${type}`;
      el.textContent = text;
      el.style.display = 'block';
    }

    // Enter key support
    document.getElementById('currentPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('newPassword').focus();
    });
    document.getElementById('newPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('confirmPassword').focus();
    });
    document.getElementById('confirmPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('btnChangePassword').click();
    });
  </script>
</body>
</html>
