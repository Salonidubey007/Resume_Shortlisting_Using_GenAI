<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <meta charset="UTF-8">
  <style>
    body {
      background: linear-gradient(135deg, #12239E 0%, #0070AD 100%);
      font-family: 'Segoe UI';
      height: 100vh;
      padding: 40px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .card {
      background: #ffffff;
      padding: 50px 60px;
      border-radius: 16px;
      width: 450px;
      text-align: left;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    h2 {
      color: #12239E;
      margin-bottom: 12px;
      text-align: center;
    }

    label {
      font-weight: 600;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 93.5%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 2px solid #e8e8e8;
      background: #fafafa;
    }

    input:focus {
      border-color: #6bcf7f;
      outline: none;
      background: white;
      box-shadow: 0 0 0 3px rgba(107, 207, 127, 0.2);
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #6bcf7f, #27d383);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .back-link {
      margin-top: 15px;
      display: block;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      color: #0070AD;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      min-height: 20px;
      display: none;
    }

    .error {
      background-color: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }

    .success {
      background-color: #efe;
      color: #363;
      border: 1px solid #cfc;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Reset Password</h2>

    <div id="verificationStep">
      <p style="text-align: center; color: #666; margin-bottom: 20px;">
        Enter your Employee ID and Email to verify your identity
      </p>

      <label>Employee ID</label>
      <input type="text" id="employeeId">

      <label>Email</label>
      <input type="email" id="email" placeholder="name@example.com">

      <div id="message" class="message"></div>

      <button type="button" class="btn" onclick="verifyIdentity()">Verify Identity</button>
    </div>

    <div id="resetStep" style="display: none;">
      <p style="text-align: center; color: #666; margin-bottom: 20px;">
        Enter your new password
      </p>

      <label>New Password</label>
      <input type="password" id="newPassword">

      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword">

      <div id="resetMessage" class="message"></div>

      <button type="button" class="btn" onclick="resetPassword()">Reset Password</button>
    </div>

    <a href="/login" class="back-link">← Back to Login</a>
  </div>

  <script>
    let verifiedUser = null;

    function showMessage(message, isError = true, messageDiv = 'message') {
      const messageEl = document.getElementById(messageDiv);
      messageEl.style.display = "block";
      messageEl.className = `message ${isError ? 'error' : 'success'}`;
      messageEl.innerText = message;

      if (isError) {
        // Also show alert popup for errors
        alert(`Error: ${message}`);
      }
    }

    function hideMessage(messageDiv = 'message') {
      document.getElementById(messageDiv).style.display = "none";
    }

    async function verifyIdentity() {
      const employeeId = document.getElementById('employeeId').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!employeeId || !email) {
        showMessage('Please fill in all fields.');
        return;
      }

      try {
        const response = await fetch('/api/reset-password/verify', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ employee_id: employeeId, email: email })
        });

        const result = await response.json();

        if (!response.ok) {
          showMessage(result.error || 'Verification failed.');
          return;
        }

        // Verification successful
        verifiedUser = { employee_id: employeeId, email: email };
        document.getElementById('verificationStep').style.display = 'none';
        document.getElementById('resetStep').style.display = 'block';
        hideMessage();

      } catch (error) {
        showMessage('Network error. Please try again.');
        console.error('Verification error:', error);
      }
    }

    async function resetPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || !confirmPassword) {
        showMessage('Please fill in all fields.', true, 'resetMessage');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', true, 'resetMessage');
        return;
      }

      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters long.', true, 'resetMessage');
        return;
      }

      try {
        const response = await fetch('/api/reset-password/reset', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            employee_id: verifiedUser.employee_id,
            email: verifiedUser.email,
            new_password: newPassword
          })
        });

        const result = await response.json();

        if (!response.ok) {
          showMessage(result.error || 'Password reset failed.', true, 'resetMessage');
          return;
        }

        // Password reset successful
        showMessage('Password reset successful! Redirecting to main page...', false, 'resetMessage');
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);

      } catch (error) {
        showMessage('Network error. Please try again.', true, 'resetMessage');
        console.error('Reset error:', error);
      }
    }

    // Handle Enter key in inputs
    document.getElementById('employeeId').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('email').focus();
    });

    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verifyIdentity();
    });

    document.getElementById('newPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('confirmPassword').focus();
    });

    document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') resetPassword();
    });
  </script>
</body>
</html>
